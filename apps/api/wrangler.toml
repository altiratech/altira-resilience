name = "altira-resilience-api"
main = "src/index.ts"
compatibility_date = "2026-03-07"

[[d1_databases]]
binding = "DB"
database_name = "altira-resilience-db"
database_id = "89656298-2896-423d-bf6e-3a6073f927d7"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "SOURCE_DOCUMENTS_BUCKET"
bucket_name = "altira-resilience-source-documents"
preview_bucket_name = "altira-resilience-source-documents-preview"

[[queues.producers]]
binding = "SOURCE_EXTRACTION_QUEUE"
queue = "altira-resilience-source-extraction"

[[queues.consumers]]
queue = "altira-resilience-source-extraction"
max_batch_size = 5
max_batch_timeout = 10

[ai]
binding = "AI"

[dev]
port = 8788

[vars]
APP_NAME = "Altira Resilience"
APP_STAGE = "local"
ALLOW_DEBUG_AUTH = "true"
APP_BASE_URL = "http://127.0.0.1:5195"
INVITE_EMAIL_PROVIDER = "manual_copy"

[env.preview.vars]
APP_NAME = "Altira Resilience"
APP_STAGE = "preview"
APP_BASE_URL = "https://altira-resilience-web.pages.dev"
APP_ALLOWED_ORIGINS = "https://altira-resilience-web.pages.dev,https://resilience.altiratech.com"
ALLOW_DEBUG_AUTH = "false"
INVITE_EMAIL_PROVIDER = "resend"

[[env.preview.d1_databases]]
binding = "DB"
database_name = "altira-resilience-db"
database_id = "89656298-2896-423d-bf6e-3a6073f927d7"
migrations_dir = "migrations"

[[env.preview.r2_buckets]]
binding = "SOURCE_DOCUMENTS_BUCKET"
bucket_name = "altira-resilience-source-documents"
preview_bucket_name = "altira-resilience-source-documents-preview"

[[env.preview.queues.producers]]
binding = "SOURCE_EXTRACTION_QUEUE"
queue = "altira-resilience-source-extraction"

[[env.preview.queues.consumers]]
queue = "altira-resilience-source-extraction"
max_batch_size = 5
max_batch_timeout = 10

[env.preview.ai]
binding = "AI"
